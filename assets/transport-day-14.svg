<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1295"><rect width="1080" height="1295" rx="36" fill="#faf6ef"/><text x="45" y="48" font-family="sans-serif" font-size="16" font-weight="900" fill="#b83b32">TRASA DNE · 3. 8.</text><path d="M95 137V210" stroke="#c9beb0" stroke-width="7" stroke-dasharray="12 11"/><circle cx="95" cy="105" r="34" fill="#4b845d"/><text x="95" y="112" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="800" fill="white">BUS</text><text x="165" y="96" font-family="sans-serif" font-size="21" font-weight="800" fill="#2a2622">Tsutsuji-so → Miyanoura</text><text x="165" y="128" font-family="sans-serif" font-size="16" fill="#6f675f">Bus nebo taxi s rezervou.</text><path d="M95 242V315" stroke="#c9beb0" stroke-width="7" stroke-dasharray="12 11"/><circle cx="95" cy="210" r="34" fill="#2b7d91"/><text x="95" y="217" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="800" fill="white">船</text><text x="165" y="201" font-family="sans-serif" font-size="21" font-weight="800" fill="#2a2622">Miyanoura → Uno</text><text x="165" y="233" font-family="sans-serif" font-size="16" fill="#6f675f">9:52–10:12.</text><path d="M95 347V420" stroke="#c9beb0" stroke-width="7" stroke-dasharray="12 11"/><circle cx="95" cy="315" r="34" fill="#766f68"/><text x="95" y="322" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="800" fill="white">徒歩</text><text x="165" y="306" font-family="sans-serif" font-size="21" font-weight="800" fill="#2a2622">Uno Port → Uno Station</text><text x="165" y="338" font-family="sans-serif" font-size="16" fill="#6f675f">3–5 min.</text><path d="M95 452V525" stroke="#c9beb0" stroke-width="7" stroke-dasharray="12 11"/><circle cx="95" cy="420" r="34" fill="#2f6d83"/><text x="95" y="427" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="800" fill="white">鉄</text><text x="165" y="411" font-family="sans-serif" font-size="21" font-weight="800" fill="#2a2622"