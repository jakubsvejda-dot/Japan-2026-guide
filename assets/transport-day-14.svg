mily="sans-serif" font-size="16" fill="#6f675f">Hned vedle.</text><path d="M95 977V1050" stroke="#c9beb0" stroke-width="7" stroke-dasharray="12 11"/><circle cx="95" cy="945" r="34" fill="#766f68"/><text x="95" y="952" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="800" fill="white">徒歩</text><text x="165" y="936" font-family="sans-serif" font-size="21" font-weight="800" fill="#2a2622">Koko-en → Himeji Station</text><text x="165" y="968" font-family="sans-serif" font-size="16" fill="#6f675f">Asi 20 min.</text><path d="M95 1082V1155" stroke="#c9beb0" stroke-width="7" stroke-dasharray="12 11"/><circle cx="95" cy="1050" r="34" fill="#2f6d83"/><text x="95" y="1057" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="800" fill="white">鉄</text><text x="165" y="1041" font-family="sans-serif" font-size="21" font-weight="800" fill="#2a2622">Himeji → Tokyo</text><text x="165" y="1073" font-family="sans-serif" font-size="16" fill="#6f675f">Nozomi 46 v 17:59, příjezd 20:57.</text><circle cx="95" cy="1155" r="34" fill="#343434"/><text x="95" y="1162" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="800" fill="white">TAXI</text><text x="165" y="1146" font-family="sans-serif" font-size="21" font-weight="800" fill="#2a2622">Tokyo Station → Asakusa hotel</text><text x="165" y="1178" font-family="sans-serif" font-size="16" fill="#6f675f">Po dlouhém dni nejpohodlnější.</text></svg>