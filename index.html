<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#a9231d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Japonsko 2026">
  <meta name="description" content="Offline průvodce rodinnou cestou Japonskem 2026.">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./assets/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./assets/icon-192.png">
  <link rel="stylesheet" href="./styles.css">
  <title>Mise tří dobrodruhů</title>
</head>
<body>
  <header class="topbar">
    <button id="menuBtn" class="round" aria-label="Menu">☰</button>
    <div class="brand"><span>JAPONSKO 2026</span><strong>Mise tří dobrodruhů</strong></div>
    <button id="themeBtn" class="round" aria-label="Vzhled">◐</button>
  </header>

  <aside id="drawer" class="drawer" aria-hidden="true">
    <div class="drawer-title"><b>Kapitoly</b><button id="closeBtn" class="round">×</button></div>
    <nav id="drawerNav"></nav>
    <small>Jakub · Filip · Nela</small>
  </aside>
  <div id="scrim" class="scrim"></div>

  <main id="app"></main>

  <nav class="bottom">
    <button data-view="home"><span>⌂</span><small>Domů</small></button>
    <button data-view="days"><span>◫</span><small>Dny</small></button>
    <button data-view="reservations"><span>✓</span><small>Rezervace</small></button>
    <button data-view="checklist"><span>☑</span><small>Checklist</small></button>
    <button data-view="notes"><span>✎</span><small>Poznámky</small></button>
  </nav>

  <script type="module" src="./app.js"></script>
</body>
</html>
